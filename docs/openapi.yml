openapi: 3.0.3
info:
  title: GlobalErrands API
  version: "0.1.0"
paths:
  /auth/login:
    post:
      summary: Login with email/password or OAuth token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: OK
components:
  schemas:
    Login:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
